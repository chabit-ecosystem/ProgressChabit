<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progreso Chabit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <h1>Progreso Chabit</h1>
        <p class="subtitle">Seguimiento de avances de CRM y Wallet/Ticketera</p>
      </header>

      <div class="card">
        <h2 class="section-title">Avances Generales</h2>
        <div id="progress-container"></div>
      </div>

      <div class="grid">
        <div class="card">
          <h2 class="section-title">Último avance</h2>
          <div class="last-update" id="last-avance-container"></div>
        </div>

        <div class="card">
          <h2 class="section-title">Pantallas actuales</h2>
          <div class="screen-list" id="actual-pages-container"></div>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Links útiles</h2>
        <div class="links" id="links-container"></div>
      </div>

      <div class="card">
        <h2 class="section-title">
          Pendientes inamovibles (dependen de terceros)
        </h2>
        <div class="pending-list" id="blocks-container"></div>
      </div>

      <footer>Chabit Progress Dashboard</footer>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
